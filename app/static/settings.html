<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PriceReader 设置</title>
  <link rel="stylesheet" href="/static/settings.css">
</head>
<body>
  <main>
    <section class="panel">
      <div class="hero">
        <h1>PriceReader 运行时设置</h1>
        <p>本页只保存本地运行时敏感配置，不写入 Git 跟踪文件。豆瓣详情页富化只有在填写豆瓣 Cookie 后才会启用。</p>
      </div>
      <form id="settings-form">
        <div class="field">
          <label for="wechat_push_url">推送地址 WECHAT_PUSH_URL</label>
          <input id="wechat_push_url" name="wechat_push_url" type="text" placeholder="微信网关推送地址">
        </div>
        <div class="field">
          <label for="douban_cookie">豆瓣登录态 DOUBAN_COOKIE</label>
          <textarea id="douban_cookie" name="douban_cookie" placeholder="填入你的豆瓣 Cookie"></textarea>
          <div class="hint">默认用于豆瓣详情页按需抓取。留空则只做公开列表页抓取。</div>
        </div>
        <div class="field">
          <label for="smzdm_cookie">什么值得买登录态 SMZDM_COOKIE</label>
          <textarea id="smzdm_cookie" name="smzdm_cookie" placeholder="按需填写 SMZDM Cookie"></textarea>
        </div>
        <div class="field">
          <label for="wechat_push_token">推送令牌 WECHAT_PUSH_TOKEN</label>
          <input id="wechat_push_token" name="wechat_push_token" type="text" placeholder="微信网关 Bearer Token">
        </div>
        <div class="field">
          <label for="wechat_target_id">目标标识 WECHAT_TARGET_ID</label>
          <input id="wechat_target_id" name="wechat_target_id" type="text" placeholder="微信目标 targetId">
        </div>
        <div class="actions">
          <button type="submit">保存配置</button>
          <button class="secondary" type="button" id="reveal-button">显示敏感值</button>
          <button class="secondary" type="button" id="reload-button">重新加载</button>
          <span class="status" id="status">未加载</span>
        </div>
      </form>
    </section>
  </main>
  <script type="module" src="/static/settings.js"></script>
</body>
</html>
